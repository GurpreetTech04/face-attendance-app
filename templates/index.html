<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header h1 {
            color: #4a5568;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .status-card h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .status-card .status-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .btn-start {
            background: #48bb78;
            color: white;
        }

        .btn-start:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-stop {
            background: #f56565;
            color: white;
        }

        .btn-stop:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        .btn-refresh {
            background: #4299e1;
            color: white;
        }

        .btn-refresh:hover {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 153, 225, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h4 {
            color: #718096;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .stat-card .stat-number {
            color: #4a5568;
            font-size: 2.5em;
            font-weight: bold;
        }

        .attendance-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .attendance-table h3 {
            color: #4a5568;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }

        tr:hover {
            background: #f7fafc;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
            display: block;
        }

        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #718096;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Face Attendance System</h1>
            <p>Real-time face recognition based attendance management</p>
        </div>

        <div class="control-panel">
            <div class="status-card">
                <h3>System Status</h3>
                <div class="status-value" id="statusDisplay">Checking...</div>
            </div>

            <div id="alertMessage" class="alert"></div>

            <div class="button-group">
                <button class="btn btn-start" id="startBtn" onclick="startAttendance()">
                    ▶️ Start System
                </button>
                <button class="btn btn-stop" id="stopBtn" onclick="stopAttendance()" disabled>
                    ⏹️ Stop System
                </button>
                <button class="btn btn-refresh" onclick="refreshData()">
                    🔄 Refresh Data
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Students</h4>
                <div class="stat-number" id="totalStudents">0</div>
            </div>
            <div class="stat-card">
                <h4>Present Today</h4>
                <div class="stat-number" id="presentToday">0</div>
            </div>
            <div class="stat-card">
                <h4>Total Records</h4>
                <div class="stat-number" id="totalRecords">0</div>
            </div>
            <div class="stat-card">
                <h4>Active Students</h4>
                <div class="stat-number" id="activeStudents">0</div>
            </div>
        </div>

        <div class="attendance-table">
            <h3>📋 Today's Attendance</h3>
            <div id="attendanceLoading" class="loading">Loading attendance data...</div>
            <div id="attendanceContent"></div>
        </div>
    </div>

    <script>
        // Check status every 5 seconds
        setInterval(checkStatus, 5000);
        
        // Initial load
        window.onload = function() {
            checkStatus();
            loadStats();
            loadTodayAttendance();
            loadStudents();
        };

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            setTimeout(() => {
                alertDiv.className = 'alert';
            }, 5000);
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusDisplay = document.getElementById('statusDisplay');
                const startBtn = document.getElementById('startBtn');
                const stopBtn = document.getElementById('stopBtn');
                
                if (data.status === 'running') {
                    statusDisplay.innerHTML = '🟢 Running (PID: ' + data.pid + ')';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    statusDisplay.innerHTML = '🔴 Stopped';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            } catch (error) {
                console.error('Error checking status:', error);
                showAlert('Error connecting to server', 'error');
            }
        }

        async function startAttendance() {
            try {
                const startBtn = document.getElementById('startBtn');
                startBtn.disabled = true;
                startBtn.innerHTML = '⏳ Starting...';
                
                const response = await fetch('/api/start_attendance', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert(data.message || 'System started successfully', 'success');
                    checkStatus();
                } else {
                    showAlert(data.message || 'Failed to start system', 'error');
                    startBtn.disabled = false;
                    startBtn.innerHTML = '▶️ Start System';
                }
            } catch (error) {
                console.error('Error starting:', error);
                showAlert('Error connecting to server', 'error');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').innerHTML = '▶️ Start System';
            }
        }

        async function stopAttendance() {
            try {
                const stopBtn = document.getElementById('stopBtn');
                stopBtn.disabled = true;
                stopBtn.innerHTML = '⏳ Stopping...';
                
                const response = await fetch('/api/stop_attendance', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert(data.message || 'System stopped successfully', 'success');
                    checkStatus();
                } else {
                    showAlert(data.message || 'Failed to stop system', 'error');
                }
                
                stopBtn.innerHTML = '⏹️ Stop System';
            } catch (error) {
                console.error('Error stopping:', error);
                showAlert('Error connecting to server', 'error');
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('stopBtn').innerHTML = '⏹️ Stop System';
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('totalStudents').textContent = data.total_students || 0;
                document.getElementById('presentToday').textContent = data.today_count || 0;
                document.getElementById('totalRecords').textContent = data.total_records || 0;
                document.getElementById('activeStudents').textContent = data.unique_students || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadTodayAttendance() {
            try {
                document.getElementById('attendanceLoading').style.display = 'block';
                
                const response = await fetch('/api/attendance/today');
                const data = await response.json();
                
                document.getElementById('attendanceLoading').style.display = 'none';
                
                let html = '';
                
                if (data.data && data.data.length > 0) {
                    html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Time</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.data.map(record => `
                                    <tr>
                                        <td><strong>${record.Name || record.name || 'N/A'}</strong></td>
                                        <td>${record.Time || record.time || 'N/A'}</td>
                                        <td>${record.Date || record.date || 'N/A'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    html = '<div class="no-data">📭 No attendance records for today</div>';
                }
                
                document.getElementById('attendanceContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading attendance:', error);
                document.getElementById('attendanceLoading').style.display = 'none';
                document.getElementById('attendanceContent').innerHTML = 
                    '<div class="no-data">❌ Error loading attendance data</div>';
            }
        }

        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                const data = await response.json();
                
                // Update total students count
                if (data.data) {
                    document.getElementById('totalStudents').textContent = data.data.length;
                }
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        function refreshData() {
            loadStats();
            loadTodayAttendance();
            loadStudents();
            checkStatus();
            showAlert('Data refreshed successfully', 'success');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        #video {
            width: 100%;
            height: auto;
            display: block;
            background: #f0f0f0;
        }
        
        .overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }
        
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-title {
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        #result {
            min-height: 60px;
            padding: 15px;
            border-radius: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            font-size: 1em;
            line-height: 1.5;
        }
        
        .success {
            color: #28a745;
            font-weight: 600;
        }
        
        .error {
            color: #dc3545;
            font-weight: 600;
        }
        
        .info {
            color: #17a2b8;
            font-weight: 600;
        }
        
        .attendance-list {
            max-height: 300px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }
        
        .attendance-item {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }
        
        .attendance-item:last-child {
            border-bottom: none;
        }
        
        .attendance-name {
            font-weight: 500;
            color: #333;
        }
        
        .attendance-time {
            color: #666;
            font-size: 0.9em;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Face Attendance System</h1>
        
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="overlay" id="cameraStatus">Initializing camera...</div>
        </div>
        
        <div class="button-container">
            <button class="btn btn-primary" id="captureBtn" disabled>
                <span id="btnText">Capture & Mark Attendance</span>
                <span id="btnLoader" class="loading hidden"></span>
            </button>
            <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh</button>
        </div>
        
        <div class="status-card">
            <div class="status-title">📋 Current Status</div>
            <div id="result">Ready to capture. Point your face at the camera.</div>
        </div>
        
        <div class="status-card">
            <div class="status-title">
                📊 Recent Attendance 
                <span style="float: right;">
                    <button class="btn btn-secondary" style="padding: 5px 15px; font-size: 14px;" onclick="loadAttendance()">↻</button>
                </span>
            </div>
            <div id="attendanceList" class="attendance-list">
                Loading attendance records...
            </div>
        </div>
    </div>

    <canvas id="canvas" width="640" height="480" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const result = document.getElementById('result');
        const cameraStatus = document.getElementById('cameraStatus');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        // Access webcam
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    } 
                });
                
                video.srcObject = stream;
                cameraStatus.textContent = 'Camera ready';
                cameraStatus.style.background = 'rgba(40, 167, 69, 0.8)';
                captureBtn.disabled = false;
                
                // Check server health
                checkServerHealth();
                
            } catch (err) {
                console.error('Error accessing webcam:', err);
                cameraStatus.textContent = 'Camera error: ' + err.message;
                cameraStatus.style.background = 'rgba(220, 53, 69, 0.8)';
                captureBtn.disabled = true;
                
                result.innerHTML = '<span class="error">❌ Cannot access camera. Please ensure:</span><br>' +
                                  '1. You\'ve granted camera permissions<br>' +
                                  '2. No other app is using the camera<br>' +
                                  '3. You\'re using HTTPS (required for camera access)';
            }
        }

        // Check server health
        async function checkServerHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    result.innerHTML = `<span class="success">✅ System ready</span><br>
                                       Loaded ${data.faces_loaded} face(s) for recognition`;
                }
            } catch (err) {
                console.error('Health check failed:', err);
            }
        }

        // Load attendance records
        async function loadAttendance() {
            const attendanceList = document.getElementById('attendanceList');
            
            try {
                const response = await fetch('/attendance');
                const data = await response.json();
                
                if (data.length === 0) {
                    attendanceList.innerHTML = '<div style="text-align: center; color: #666;">No attendance records yet</div>';
                    return;
                }
                
                // Show last 10 records
                const recent = data.slice(-10).reverse();
                let html = '';
                recent.forEach(record => {
                    html += `<div class="attendance-item">
                        <span class="attendance-name">${record.name}</span>
                        <span class="attendance-time">${record.timestamp}</span>
                    </div>`;
                });
                
                if (data.length > 10) {
                    html += `<div style="text-align: center; color: #666; padding-top: 10px;">
                        Showing last 10 of ${data.length} records
                    </div>`;
                }
                
                attendanceList.innerHTML = html;
                
            } catch (err) {
                console.error('Error loading attendance:', err);
                attendanceList.innerHTML = '<span class="error">Error loading attendance records</span>';
            }
        }

        // Capture and send image
        async function captureAndSend() {
            // Disable button and show loading
            captureBtn.disabled = true;
            btnText.textContent = 'Processing...';
            btnLoader.classList.remove('hidden');
            
            // Draw video frame to canvas
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // Get image as base64
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            
            try {
                result.innerHTML = '<span class="info">🔄 Processing face recognition...</span>';
                
                const response = await fetch('/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    let resultHtml = '';
                    
                    data.matches.forEach(match => {
                        if (match.recognized) {
                            if (match.attendance_marked) {
                                resultHtml += `<span class="success">✅ ${match.message}</span><br>`;
                            } else {
                                resultHtml += `<span class="info">ℹ️ ${match.message}</span><br>`;
                            }
                        } else {
                            resultHtml += `<span class="error">❌ ${match.message}</span><br>`;
                        }
                    });
                    
                    result.innerHTML = resultHtml || 'No faces processed';
                    
                    // Refresh attendance list
                    await loadAttendance();
                    
                } else {
                    result.innerHTML = `<span class="error">❌ Error: ${data.message}</span>`;
                }
                
            } catch (err) {
                console.error('Error:', err);
                result.innerHTML = `<span class="error">❌ Connection error: ${err.message}</span>`;
            } finally {
                // Re-enable button
                captureBtn.disabled = false;
                btnText.textContent = 'Capture & Mark Attendance';
                btnLoader.classList.add('hidden');
            }
        }

        // Refresh everything
        function refresh() {
            result.innerHTML = 'Refreshing...';
            loadAttendance();
            checkServerHealth();
        }

        // Event listeners
        captureBtn.addEventListener('click', captureAndSend);
        refreshBtn.addEventListener('click', refresh);

        // Initialize camera when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initCamera();
            loadAttendance();
            
            // Check for HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                result.innerHTML = '<span class="error">⚠️ Warning: Camera access requires HTTPS</span>';
            }
        });

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>

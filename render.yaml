services:
  - type: web
    name: face-attendance-app
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y \
        cmake \
        build-essential \
        libx11-dev \
        libopenblas-dev \
        liblapack-dev \
        libjpeg-dev \
        libpng-dev \
        libtiff-dev \
        libgtk-3-dev \
        libboost-all-dev \
        && pip install --upgrade pip \
        && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: PYTHONUNBUFFERED
        value: true
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: attendance-data
      mountPath: /opt/render/project/src
      sizeGB: 1
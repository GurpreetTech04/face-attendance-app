services:
  - type: web
    name: face-attendance-app
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
        cmake \
        build-essential \
        libx11-dev \
        libopenblas-dev \
        liblapack-dev \
        libjpeg-dev \
        libpng-dev \
        libtiff-dev \
        libgtk-3-dev \
        libboost-all-dev \
        && pip install --upgrade pip \
        && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: true